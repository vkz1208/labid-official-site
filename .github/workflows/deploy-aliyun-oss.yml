name: Deploy to Alibaba Cloud OSS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  OSSUTIL_VERSION: 2.3.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -fsSL -o ossutil.zip "https://gosspublic.alicdn.com/ossutil/v2/${OSSUTIL_VERSION}/ossutil-${OSSUTIL_VERSION}-linux-amd64.zip"
          unzip -q ossutil.zip
          sudo install -m 0755 "ossutil-${OSSUTIL_VERSION}-linux-amd64/ossutil" /usr/local/bin/ossutil
          ossutil version

      - name: Upload static website to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          OSS_REGION: ${{ vars.ALIYUN_OSS_REGION }}
          OSS_BUCKET: ${{ vars.ALIYUN_OSS_BUCKET }}
        run: |
          test -n "$OSS_ACCESS_KEY_ID"
          test -n "$OSS_ACCESS_KEY_SECRET"
          test -n "$OSS_REGION"
          test -n "$OSS_BUCKET"

          cat > website-configuration.json <<'JSON'
          {
            "IndexDocument": {
              "Suffix": "index.html",
              "SupportSubDir": "true",
              "Type": "0"
            },
            "ErrorDocument": {
              "Key": "404.html",
              "HttpStatus": "404"
            }
          }
          JSON

          ossutil api put-bucket-public-access-block \
            --bucket "$OSS_BUCKET" \
            --region "$OSS_REGION" \
            --public-access-block-configuration '{"BlockPublicAccess":"false"}'

          ossutil cp index.html "oss://${OSS_BUCKET}/index.html" --region "$OSS_REGION" --acl public-read --force
          ossutil cp 404.html "oss://${OSS_BUCKET}/404.html" --region "$OSS_REGION" --acl public-read --force
          ossutil cp assets "oss://${OSS_BUCKET}/assets/" --region "$OSS_REGION" --recursive --acl public-read --force

          ossutil api put-bucket-website \
            --bucket "$OSS_BUCKET" \
            --region "$OSS_REGION" \
            --website-configuration file://website-configuration.json

          if ! ossutil api put-cname \
            --bucket "$OSS_BUCKET" \
            --region "$OSS_REGION" \
            --cname-configuration '{"Cname":{"Domain":"www.labid.cn"}}'; then
            echo "Custom domain binding needs domain ownership verification."
            ossutil api create-cname-token \
              --bucket "$OSS_BUCKET" \
              --region "$OSS_REGION" \
              --cname-configuration '{"Cname":{"Domain":"www.labid.cn"}}' || true
            ossutil api get-cname-token \
              --bucket "$OSS_BUCKET" \
              --region "$OSS_REGION" \
              --cname "www.labid.cn" \
              --output-format json || true
          fi
